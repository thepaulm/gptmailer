<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Voice Summary Mailer</title>
    <link rel="stylesheet" href="/static/style.css?v=20260308-2" />
  </head>
  <body>
    <main class="wrap">
      <header>
        <h1>Voice Summary Mailer</h1>
        <p>Tap to talk. Say “email me a summary” to send the chat by email.</p>
        <div class="auth">
          <span id="authUser">Not signed in</span>
          <button id="loginBtn" type="button">Sign in with Google</button>
          <button id="logoutBtn" type="button" hidden>Sign out</button>
        </div>
      </header>

      <section class="controls">
        <button id="recordBtn" class="record">Start Recording</button>
        <label>
          Voice
          <select id="voiceSelect">
            <option value="alloy">alloy</option>
            <option value="ash">ash</option>
            <option value="ballad">ballad</option>
            <option value="coral">coral</option>
            <option value="echo">echo</option>
            <option value="fable">fable</option>
            <option value="nova">nova</option>
            <option value="onyx">onyx</option>
            <option value="sage" selected>sage</option>
            <option value="shimmer">shimmer</option>
          </select>
        </label>
        <label>
          Speech speed
          <select id="speechRateSelect">
            <option value="1.0">1.0x</option>
            <option value="1.15">1.15x</option>
            <option value="1.25">1.25x</option>
            <option value="1.3" selected>1.3x</option>
            <option value="1.35">1.35x</option>
            <option value="1.4">1.4x</option>
          </select>
        </label>
        <label>
          <input id="speakToggle" type="checkbox" checked />
          Speak replies
        </label>
        <div id="status" class="status">Idle</div>
      </section>

      <section class="log">
        <h2>Transcript</h2>
        <div id="transcript"></div>
      </section>
    </main>

    <script src="/static/app.js?v=20260308-2"></script>
  </body>
</html>
